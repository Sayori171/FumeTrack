<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidad de Resiliencia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-sans p-6 flex flex-col items-center justify-start">

  <!-- Contenedor Principal -->
  <div class="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-xl border border-slate-700/50 p-6 md:p-8 space-y-6">
    
    <!-- Barra de Navegación Superior -->
    <div class="flex justify-between items-center border-b border-slate-700/50 pb-4">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-teal-400 shadow-[0_0_8px_rgba(45,212,191,0.5)]"></div>
        <span class="font-semibold text-slate-200">Sala de Soporte Colectivo</span>
      </div>
      <a href="dashboard.html" class="text-sm font-medium text-emerald-400 hover:text-emerald-300 transition flex items-center gap-1">
        ← Volver al Tablero
      </a>
    </div>

    <!-- Caja de Publicación (Crear Post) -->
    <div class="bg-slate-850 p-4 rounded-xl border border-slate-700/40 space-y-3">
      <div class="flex items-center gap-3">
        <div id="user-avatar" class="w-9 h-9 rounded-full bg-emerald-600/30 border border-emerald-500/30 flex items-center justify-center text-emerald-400 font-bold text-sm">
          U
        </div>
        <span id="user-label" class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Comparte tu progreso...</span>
      </div>
      
      <form id="form-publicar" class="space-y-3">
        <textarea 
          id="input-mensaje"
          rows="3" 
          required
          placeholder="¿Cómo te sientes hoy? ¿Lograste vencer un antojo fuerte? Deja un mensaje de aliento para los demás..." 
          class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white placeholder-slate-500 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition resize-none"
        ></textarea>
        
        <div class="flex justify-between items-center">
          <span class="text-xs text-slate-500">Mantén un tono empático y constructivo.</span>
          <button 
            type="submit"
            class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 px-5 rounded-xl text-xs transition shadow-md shadow-emerald-900/20 active:scale-[0.98]"
          >
            Publicar en el Feed
          </button>
        </div>
      </form>
    </div>

    <!-- Separador del Feed -->
    <div class="flex items-center my-2">
      <div class="flex-1 h-px bg-slate-700/50"></div>
      <span class="px-3 text-xs font-bold tracking-widest text-slate-500 uppercase">Actividad Reciente</span>
      <div class="flex-1 h-px bg-slate-700/50"></div>
    </div>

    <!-- Contenedor Dinámico del Feed de Mensajes -->
    <div id="feed-comunidad" class="space-y-4 max-h-[500px] overflow-y-auto pr-1">
      <!-- Los comentarios e historias se inyectarán dinámicamente aquí -->
    </div>

  </div>

  <!-- Lógica de Control del Feed -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('form-publicar');
      const inputMensaje = document.getElementById('input-mensaje');
      const feedComunidad = document.getElementById('feed-comunidad');
      
      const nombreUsuario = localStorage.getItem('user_nombre') || 'Usuario';
      const tipoFumador = localStorage.getItem('perfil_tipo') || 'En Proceso';

      document.getElementById('user-avatar').innerText = nombreUsuario.charAt(0).toUpperCase();
      document.getElementById('user-label').innerText = `${nombreUsuario} (${tipoFumador})`;

      const postsPredeterminados = [
        {
          nombre: "Camilo V.",
          perfil: "Fumador de Hábito Automático",
          mensaje: "¡Hoy completé mi primer almuerzo completo sin encender un cigarrillo después! El antojo duró unos 3 minutos pero interactué con la barra de progreso y logré distraerme. ¡Sí se puede muchachos!",
          tiempo: "Hace 15 min"
        },
        {
          nombre: "Sara M.",
          perfil: "Fumador Emocional / Por Ansiedad",
          mensaje: "Ayer tuve un desliz en la noche por culpa del estrés del trabajo... Me sentía súper culpable, pero me encantó que la app no me borrara todo el dinero que ya llevo ahorrado en el mes. Eso me dio fuerzas para levantarme hoy con toda.",
          tiempo: "Hace 2 horas"
        },
        {
          nombre: "Diego R.",
          perfil: "Fumador Social / De Entorno",
          mensaje: "Salí de fiesta el fin de semana y rechacé 3 cigarrillos que me ofrecieron mis amigos de la universidad. Es rarísimo verse en el perfil como alguien que resiste, pero te sube la moral al 100%.",
          tiempo: "Ayer"
        }
      ];

      let postsLocales = JSON.parse(localStorage.getItem('comunidad_posts')) || [];

      function renderizarFeed() {
        feedComunidad.innerHTML = '';
        
        const todoElFeed = [...postsLocales, ...postsPredeterminados];

        todoElFeed.forEach(post => {
          const card = document.createElement('div');
          card.className = "bg-slate-750 p-5 rounded-xl border border-slate-700/40 space-y-3 shadow-sm";

          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center text-teal-400 font-bold text-xs uppercase">
                  ${post.nombre.charAt(0)}
                </div>
                <div>
                  <h4 class="text-sm font-bold text-white flex items-center gap-2">
                    ${post.nombre}
                    <span class="text-[10px] font-medium px-2 py-0.5 rounded bg-slate-900 border border-slate-700 text-slate-400 normal-case">
                      ${post.perfil}
                    </span>
                  </h4>
                  <p class="text-[11px] text-slate-500">${post.tiempo}</p>
                </div>
              </div>
            </div>
            <p class="text-xs md:text-sm text-slate-300 leading-relaxed pl-1">
              ${post.mensaje}
            </p>
          `;
          feedComunidad.appendChild(card);
        });
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const nuevoPost = {
          nombre: nombreUsuario,
          perfil: tipoFumador,
          mensaje: inputMensaje.value.trim(),
          tiempo: "Ahora mismo"
        };

        postsLocales.unshift(nuevoPost);
        localStorage.setItem('comunidad_posts', JSON.stringify(postsLocales));

        inputMensaje.value = '';
        renderizarFeed();
      });

      renderizarFeed();
    });
  </script>
</body>
</html>
