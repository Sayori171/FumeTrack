<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Perfil de Resiliencia</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-sans p-4 flex flex-col items-center justify-center">

  <!-- Contenedor Principal Interactiva -->
  <div class="w-full max-w-xl bg-slate-800 rounded-2xl shadow-xl border border-slate-700/50 p-8 relative min-h-[450px] flex flex-col justify-between">
    
    <!-- Barra de progreso superior del Test -->
    <div class="absolute top-0 left-0 right-0 h-1.5 bg-slate-700 rounded-t-2xl overflow-hidden">
      <div id="test-progress" class="bg-gradient-to-r from-teal-500 to-emerald-400 h-full transition-all duration-300" style="width: 0%"></div>
    </div>

    <!-- Indicador de número de pregunta -->
    <div class="text-xs font-semibold tracking-wider text-slate-400 uppercase mb-2">
      Progreso: <span id="num-pregunta" class="text-emerald-400">1</span> / 15
    </div>

    <!-- Contenedor dinámico de Pregunta y Opciones -->
    <div class="my-auto space-y-6">
      <h2 id="titulo-pregunta" class="text-xl md:text-2xl font-bold text-white tracking-tight">
        <!-- JS inyectará el texto aquí -->
      </h2>

      <!-- Las opciones interactivas se renderizan aquí -->
      <div id="contenedor-opciones" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <!-- JS inyectará botones grandes aquí -->
      </div>
    </div>

    <!-- Botón Opcional para Volver Atrás -->
    <div class="flex justify-between items-center pt-6 border-t border-slate-700/30 mt-6">
      <button id="btn-atras" class="text-sm font-medium text-slate-400 hover:text-white transition hidden">
        ← Volver a la anterior
      </button>
      <span class="text-xs text-slate-500 ml-auto">Tu información es 100% privada y local.</span>
    </div>

  </div>

  <script>
    // 1. BANCO DE PREGUNTAS (Estructurado con claves para el algoritmo de perfilación)
const preguntas = [
  // 1. Contexto
  { q: "¿Dónde sueles fumar más?", cat: "contexto", options: [{t:"🏫 Universidad", v:"social"}, {t:"🏠 Casa", v:"ansiedad"}, {t:"🎉 Reuniones", v:"social"}, {t:"🚶‍♂️ Calle", v:"rutina"}] },
  { q: "¿Con quién fumas normalmente?", cat: "contexto", options: [{t:"Solo", v:"ansiedad"}, {t:"Amigos", v:"social"}, {t:"Familia", v:"rutina"}, {t:"Compañeros", v:"social"}] },
  // 2. Emociones
  { q: "¿Cómo te sientes antes de fumar?", cat: "emocion", options: [{t:"😓 Estresado", v:"ansiedad"}, {t:"😐 Neutral", v:"rutina"}, {t:"😄 Feliz", v:"social"}, {t:"😡 Ansioso", v:"ansiedad"}] },
  { q: "¿Cómo te sientes después de fumar?", cat: "emocion", options: [{t:"Relajado", v:"ansiedad"}, {t:"Igual", v:"rutina"}, {t:"Culpable", v:"ansiedad"}, {t:"Energizado", v:"social"}] },
  // 3. Hábitos y rutina
  { q: "¿En qué momento del día fumas más?", cat: "rutina", options: [{t:"🌅 Mañana", v:"rutina"}, {t:"☀️ Tarde", v:"social"}, {t:"🌙 Noche", v:"ansiedad"}] },
  { q: "¿Cuándo fue tu primer cigarrillo del día?", cat: "rutina", options: [{t:"Al despertar", v:"ansiedad"}, {t:"Después de comer", v:"rutina"}, {t:"En la tarde", v:"social"}] },
  // 4. Frecuencia
  { q: "¿Cuántos cigarrillos consumes normalmente?", cat: "frecuencia", options: [{t:"1-3", v:"moderado"}, {t:"4-7", v:"moderado"}, {t:"8 o más", v:"dependencia"}] },
  { q: "¿Tu consumo cambia según el día?", cat: "frecuencia", options: [{t:"Sí", v:"social"}, {t:"No", v:"rutina"}] },
  // 5. Motivación
  { q: "¿Por qué fumas principalmente?", cat: "motivacion", options: [{t:"Estrés", v:"ansiedad"}, {t:"Costumbre", v:"rutina"}, {t:"Social", v:"social"}, {t:"Placer", v:"rutina"}] },
  { q: "¿Alguna vez has intentado reducir tu consumo?", cat: "motivacion", options: [{t:"Sí", v:"cambio"}, {t:"No", v:"estable"}] },
  // 6. Autopercepción
  { q: "¿Cómo describirías tu consumo?", cat: "percepcion", options: [{t:"Controlado", v:"moderado"}, {t:"Moderado", v:"moderado"}, {t:"Elevado", v:"dependencia"}] },
  { q: "¿Crees que fumar forma parte de tu rutina diaria?", cat: "percepcion", options: [{t:"Sí", v:"rutina"}, {t:"No", v:"social"}] },
  // 7. Impacto
  { q: "¿Sientes que afecta tu día a día?", cat: "impacto", options: [{t:"Sí", v:"dependencia"}, {t:"No", v:"moderado"}, {t:"A veces", v:"moderado"}] },
  { q: "¿Te gustaría cambiar tu consumo?", cat: "impacto", options: [{t:"Sí", v:"cambio"}, {t:"Tal vez", v:"cambio"}, {t:"No", v:"estable"}] },
  // 8. Innovadora
  { q: "Si pudieras cambiar algo de tu consumo, ¿qué sería?", cat: "innovacion", options: [{t:"Fumar menos", v:"cambio"}, {t:"Solo en ciertos momentos", v:"social"}, {t:"No cambiar nada", v:"estable"}] }
];

let indiceActual = 0;
let respuestasUsuario = [];

// Referencias del DOM
const tituloPregunta = document.getElementById('titulo-pregunta');
const contenedorOpciones = document.getElementById('contenedor-opciones');
const numPregunta = document.getElementById('num-pregunta');
const testProgress = document.getElementById('test-progress');
const btnAtras = document.getElementById('btn-atras');

// 2. FUNCIÓN PARA MOSTRAR LA PREGUNTA ACTUAL
function cargarPregunta() {
  const data = preguntas[indiceActual];
  
  // Actualizar textos y barra superior
  tituloPregunta.innerText = data.q;
  numPregunta.innerText = indiceActual + 1;
  const porcentajeProgreso = ((indiceActual) / preguntas.length) * 100;
  testProgress.style.width = `${porcentajeProgreso}%`;

  // Mostrar/ocultar botón atrás
  if (indiceActual > 0) {
    btnAtras.classList.remove('hidden');
  } else {
    btnAtras.classList.add('hidden');
  }

  // Vaciar opciones e inyectar las nuevas en formato de botones interactivos de Tailwind
  contenedorOpciones.innerHTML = '';
  data.options.forEach(opcion => {
    const boton = document.createElement('button');
    boton.className = "w-full text-left bg-slate-900 hover:bg-slate-750 text-slate-100 hover:text-white border border-slate-700 hover:border-emerald-500 px-5 py-4 rounded-xl font-medium transition-all duration-150 shadow-sm active:scale-[0.99] focus:outline-none";
    boton.innerText = opcion.t;
    
    // Manejar la selección
    boton.addEventListener('click', () => seleccionarOpcion(opcion.v));
    contenedorOpciones.appendChild(boton);
  });
}

// 3. CAPTURAR RESPUESTA Y AVANZAR
function seleccionarOpcion(valor) {
  respuestasUsuario[indiceActual] = valor;
  
  if (indiceActual < preguntas.length - 1) {
    indiceActual++;
    cargarPregunta();
  } else {
    calcularTipoFumador();
  }
}

// Volver a la pregunta anterior
btnAtras.addEventListener('click', () => {
  if (indiceActual > 0) {
    indiceActual--;
    cargarPregunta();
  }
});

// 4. ALGORITMO INTEGRADO: DETERMINA EL PERFIL DEL USUARIO (ACTUALIZADO E INTELIGENTE)
function calcularTipoFumador() {
  // Contadores de tendencias basándonos en los valores de respuesta
  const conteos = { social: 0, ansiedad: 0, rutina: 0, dependencia: 0, moderado: 0 };
  
  respuestasUsuario.forEach(val => {
    if (conteos[val] !== undefined) conteos[val]++;
  });

  let tipoFinal = "Fumador de Rutina"; // Por defecto
  let descripcionFinal = "Utilizas el cigarrillo como un pilar automatizado en tus bloques diarios.";

  // Lógica de descarte por mayor peso
  const maxRegistros = Math.max(conteos.social, conteos.ansiedad, conteos.rutina, conteos.dependencia);

  if (conteos.dependencia >= 3) {
    tipoFinal = "Fumador de Alta Dependencia";
    descripcionFinal = "El tabaco tiene un peso fuerte en tus hábitos físicos y emocionales diarios. Tu cuerpo pide nicotina de manera sistemática.";
  } else if (maxRegistros === conteos.ansiedad) {
    tipoFinal = "Fumador Emocional / Por Ansiedad";
    descripcionFinal = "El tabaco actúa como tu válvula de escape o escudo protector frente al estrés, preocupaciones o picos de ansiedad.";
  } else if (maxRegistros === conteos.social) {
    tipoFinal = "Fumador Social / De Entorno";
    descripcionFinal = "Fumas principalmente rodeado de personas, en eventos, la universidad o contextos festivos. Está ligado a la pertenencia.";
  } else if (maxRegistros === conteos.rutina) {
    tipoFinal = "Fumador de Hábito Automático";
    descripcionFinal = "Fumas de manera mecánica por costumbres asociadas a momentos específicos (ej: después de comer o de camino a un sitio).";
  } else {
    tipoFinal = "Fumador Moderado / Ocasional";
    descripcionFinal = "Tu consumo es intermitente y controlado. Tienes una base excelente para frenarlo por completo fácilmente.";
  }

  // Guardar el tipo y perfil calculado en el almacenamiento local
  localStorage.setItem('perfil_tipo', tipoFinal);
  localStorage.setItem('perfil_descripcion', descripcionFinal);

  // 📌 CONTROL DE REDIRECCIÓN INTELIGENTE
  // Si 'html_salud' ya existe, significa que es un re-test de un usuario activo y NO debemos borrar sus datos ni enviarlo a la encuesta numérica.
  if (localStorage.getItem('html_salud') !== null) {
    window.location.href = 'dashboard.html';
  } else {
    // Si no existe, es la primera vez que entra y debe ir a configurar sus datos numéricos de hábito
    window.location.href = 'encuesta.html';
  }
}

// Ejecución inicial del componente interactivo
cargarPregunta();
  </script>
</body>
</html>
